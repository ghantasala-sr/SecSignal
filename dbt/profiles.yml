secsignal:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: TRAINING_ROLE
      database: SECSIGNAL
      warehouse: LAB_WH
      schema: STAGING
      threads: 4
